<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seattle Promise Tracker</title>

<style>

:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;

  --green:#16a34a;
  --yellow:#d97706;
  --blue:#2563eb;
  --red:#dc2626;
}

[data-theme="dark"]{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --muted:#94a3b8;
  --border:#334155;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.2s;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:24px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:32px;
}

h1{
  font-size:2rem;
}

.subtitle{
  color:var(--muted);
  margin-top:6px;
}

button{
  border:none;
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-bottom:32px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
}

.card h3{
  color:var(--muted);
  font-size:.9rem;
  margin-bottom:8px;
}

.big-number{
  font-size:2rem;
  font-weight:700;
}

.section-title{
  margin-bottom:16px;
  font-size:1.25rem;
}

.progress-card{
  margin-bottom:32px;
}

.progress-row{
  margin-bottom:18px;
}

.progress-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.progress-bar{
  height:12px;
  background:#dbeafe;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:var(--blue);
  width:0%;
}

.table-card{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  text-align:left;
  border-bottom:1px solid var(--border);
}

th{
  color:var(--muted);
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:600;
}

.completed{
  background:rgba(22,163,74,.15);
  color:var(--green);
}

.pending{
  background:rgba(217,119,6,.15);
  color:var(--yellow);
}

.in_progress{
  background:rgba(37,99,235,.15);
  color:var(--blue);
}

.missed{
  background:rgba(220,38,38,.15);
  color:var(--red);
}

.footer{
  margin-top:40px;
  color:var(--muted);
  font-size:.85rem;
}

@media(max-width:700px){

  h1{
    font-size:1.5rem;
  }

  header{
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
  }

}

</style>
</head>
<body>

<div class="container">

<header>

<div>
<h1>Seattle Promise Tracker</h1>
<div class="subtitle">
Tracking measurable commitments and outcomes
</div>
</div>

<button id="themeToggle">
🌙 Dark Mode
</button>

</header>

<section class="stats">

<div class="card">
<h3>Total Promises</h3>
<div class="big-number" id="totalPromises">0</div>
</div>

<div class="card">
<h3>Completed</h3>
<div class="big-number" id="completedPromises">0</div>
</div>

<div class="card">
<h3>In Progress</h3>
<div class="big-number" id="activePromises">0</div>
</div>

<div class="card">
<h3>Pending</h3>
<div class="big-number" id="pendingPromises">0</div>
</div>

</section>

<section class="card progress-card">

<h2 class="section-title">
Major Goals Progress
</h2>

<div id="progressSection">
</div>

</section>

<section class="card table-card">

<h2 class="section-title">
Promise Tracker
</h2>

<table>

<thead>
<tr>
<th>Promise</th>
<th>Category</th>
<th>Status</th>
<th>Deadline</th>
<th>Last Update</th>
</tr>
</thead>

<tbody id="promiseTable"></tbody>

</table>

</section>

<div class="footer">
Seattle Promise Tracker • Public Accountability Dashboard
</div>

</div>

<script>

const html=document.documentElement;
const toggle=document.getElementById("themeToggle");

toggle.addEventListener("click",()=>{

  const dark=html.getAttribute("data-theme")==="dark";

  if(dark){
    html.removeAttribute("data-theme");
    toggle.textContent="🌙 Dark Mode";
  }else{
    html.setAttribute("data-theme","dark");
    toggle.textContent="☀️ Light Mode";
  }

});

fetch("data.json")
.then(r=>r.json())
.then(data=>{

  const promises=data.promises;

  const total=promises.length;
  const completed=promises.filter(p=>p.status==="completed").length;
  const active=promises.filter(p=>p.status==="in_progress").length;
  const pending=promises.filter(p=>p.status==="pending").length;

  document.getElementById("totalPromises").textContent=total;
  document.getElementById("completedPromises").textContent=completed;
  document.getElementById("activePromises").textContent=active;
  document.getElementById("pendingPromises").textContent=pending;

  const table=document.getElementById("promiseTable");

  promises.forEach(p=>{

    const row=document.createElement("tr");

    row.innerHTML=`
      <td>${p.promise}</td>
      <td>${p.category}</td>
      <td>
        <span class="badge ${p.status}">
          ${p.status.replace("_"," ")}
        </span>
      </td>
      <td>${p.target_deadline || "-"}</td>
      <td>${p.last_update || "-"}</td>
    `;

    table.appendChild(row);

  });

  const progress=document.getElementById("progressSection");

  promises
    .filter(p=>p.target_value && p.current_value !== undefined)
    .forEach(p=>{

      const pct=Math.min(
        100,
        Math.round((p.current_value/p.target_value)*100)
      );

      progress.innerHTML += `
      <div class="progress-row">

        <div class="progress-header">
          <span>${p.promise}</span>
          <span>${pct}%</span>
        </div>

        <div class="progress-bar">
          <div
            class="progress-fill"
            style="width:${pct}%">
          </div>
        </div>

      </div>
      `;

    });

});

</script>

</body>
</html>
